services:
  # 1. Backend Szolgáltatás (FastAPI)
  - type: web
    name: edu-registrar-backend
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      playwright install --with-deps chromium
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edu-registrar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. Frontend Szolgáltatás (Statikus HTML/CSS/JS)
  - type: static
    name: edu-registrar-frontend
    publishPath: ./
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"

databases:
  # 3. PostgreSQL Adatbázis
  - name: edu-registrar-db
    plan: free
    region: frankfurt
