services:
  # 1. Backend Szolgáltatás (FastAPI)
  - type: web
    name: tszn-adattar
    env: docker
    plan: free
    envVars:
      # DATABASE_URL-t a Render dashboardon kell manuálisan beállítani
      # Supabase Transaction Pooler URL-je (port 6543)
      # Formátum: postgresql://postgres.PROJECT_REF:JELSZÓ@aws-1-eu-central-1.pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. MEGJEGYZÉS: Render-belső PostgreSQL eltávolítva - az alkalmazás Supabase-t használ
