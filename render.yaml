services:
  # 1. Backend Szolgáltatás (FastAPI)
  - type: web
    name: edu-registrar-backend
    env: docker
    plan: free
    # A buildCommand és startCommand már a Dockerfile-ban van
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edu-registrar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. Frontend Szolgáltatás (Statikus HTML/CSS/JS)
  - type: static
    name: edu-registrar-frontend
    publishPath: ./
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"

databases:
  # 3. PostgreSQL Adatbázis
  - name: edu-registrar-db
    plan: free
    region: frankfurt
