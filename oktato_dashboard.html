<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oktatói Portál - EduRegistrar</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-card: rgba(30, 41, 59, 0.7);
        }
        
        .tab-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 12px 24px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: white;
            border-bottom-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .class-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .class-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .attendance-pill {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attendance-pill.active-jelen { background: var(--success); color: white; }
        .attendance-pill.active-igazolt { background: var(--warning); color: white; }
        .attendance-pill.active-hiany { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>EduOktató</span>
            </div>
            <nav>
                <a href="#" class="active" onclick="resetToHome()"><i class="fas fa-home"></i> Kezdőlap</a>
                <a href="#" onclick="showTab('tab-attendance')"><i class="fas fa-calendar-check"></i> Jelenléti ív</a>
                <a href="#" onclick="showTab('tab-logbook')"><i class="fas fa-book"></i> Napló</a>
                <a href="#" onclick="showTab('tab-grades')"><i class="fas fa-star"></i> Osztályozás</a>
                <a href="index.html" style="margin-top: auto; color: #fca5a5;"><i class="fas fa-sign-out-alt"></i> Kijelentkezés</a>
            </nav>
        </aside>

        <main class="main-content">
            <!-- Header Context / Class Info -->
            <header id="main-header">
                <div>
                    <h1 id="page-title">Vezérlőpult</h1>
                    <p id="page-subtitle">Üdvözöljük! Válasszon egy osztályt a munka megkezdéséhez.</p>
                </div>
                <div id="class-summary-badges" style="display: none; gap: 10px;">
                    <!-- Dinamikus infók az osztályról -->
                </div>
            </header>

            <!-- 1. OSZTÁLYVÁLASZTÓ NÉZET -->
            <div id="class-selection-view">
                <div id="class-grid" class="content-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
                    <!-- Betöltés... -->
                    <div class="card" style="text-align: center; padding: 40px; color: gray;">
                        <i class="fas fa-circle-notch fa-spin"></i> Osztályok betöltése...
                    </div>
                </div>
            </div>

            <!-- 2. MŰVELETI NÉZET (Csak ha van kiválasztott osztály) -->
            <div id="operation-view" style="display: none;">
                <!-- Tab Navigáció -->
                <div style="background: var(--bg-card); border-radius: 12px; margin-bottom: 2rem; display: flex; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);">
                    <button class="tab-btn active" onclick="showTab('tab-attendance')"><i class="fas fa-user-check"></i> Jelenlét</button>
                    <button class="tab-btn" onclick="showTab('tab-logbook')"><i class="fas fa-pen-nib"></i> Napi Napló</button>
                    <button class="tab-btn" onclick="showTab('tab-grades')"><i class="fas fa-award"></i> Értékelés</button>
                </div>

                <!-- TARTALMAK -->
                <div id="tab-attendance" class="tab-content">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <div style="display: flex; gap: 15px; align-items: center;">
                                <input type="date" id="att-date" class="login-input" onchange="updateAttDate()">
                                <div style="color: gray; font-size: 0.9rem;">Óraszám: <input type="number" id="att-hours" value="8" style="width: 50px; background: transparent; border: 1px solid #333; color: white; padding: 5px; border-radius: 4px;"></div>
                            </div>
                            <button class="btn-primary" style="background: var(--success);" onclick="submitAttendance()"><i class="fas fa-cloud-upload-alt"></i> Összes mentése</button>
                        </div>
                        <div id="attendance-list" style="display: flex; flex-direction: column; gap: 10px;">
                            <!-- Diák sorok -->
                        </div>
                    </div>
                </div>

                <div id="tab-logbook" class="tab-content" style="display: none;">
                    <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px;">
                        <div class="card">
                            <h3>Új Naplóbejegyzés</h3>
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label>Témakör</label>
                                <input type="text" id="log-topic" class="login-input" style="width: 100%; border-radius: 12px;" placeholder="Mai tananyag címe..." list="topics-list">
                                <datalist id="topics-list"></datalist>
                            </div>
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label>Részletes tartalom</label>
                                <textarea id="log-content" class="login-input" rows="6" style="width: 100%; border-radius: 12px;" placeholder="Feladatok, gyakorlat részletei..."></textarea>
                            </div>
                            <button class="btn-primary" style="width: 100%;" onclick="submitDailyLog()"><i class="fas fa-save"></i> Bejegyzés Rögzítése</button>
                        </div>
                        <div class="card">
                            <h3>Korábbi napok</h3>
                            <div id="log-history" style="display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto;">
                                <!-- Előzmények -->
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-grades" class="tab-content" style="display: none;">
                    <div class="card">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="text-align: left; color: #94a3b8; border-bottom: 1px solid #333;">
                                    <th style="padding: 15px;">Tanuló</th>
                                    <th style="padding: 15px;">Új Jegye</th>
                                    <th style="padding: 15px;">Súly</th>
                                    <th style="padding: 15px; text-align: center;">Átlag</th>
                                    <th style="padding: 15px; text-align: center;">Művelet</th>
                                </tr>
                            </thead>
                            <tbody id="grades-list">
                                <!-- Osztályzatok -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = '';
        let currentClassId = null;
        let students = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadClasses();
            document.getElementById('att-date').valueAsDate = new Date();
        });

        async function loadClasses() {
            try {
                const r = await fetch(`${API_BASE_URL}/classes/`);
                const classes = await r.json();
                const grid = document.getElementById('class-grid');
                grid.innerHTML = classes.map(c => `
                    <div class="class-card" onclick="selectClass(${c.id}, '${c.megnevezes}')">
                        <div style="font-size: 0.8rem; color: var(--accent); font-weight: bold; margin-bottom: 5px;">OSZTÁLY</div>
                        <h3 style="margin: 0; font-size: 1.4rem;">${c.megnevezes}</h3>
                        <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                            <span style="color: #94a3b8; font-size: 0.9rem;"><i class="fas fa-user-clock"></i> Utoljára naplózva: ma</span>
                            <div style="background: rgba(99, 102, 241, 0.2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent);">
                                <i class="fas fa-chevron-right"></i>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        function resetToHome() {
            currentClassId = null;
            document.getElementById('class-selection-view').style.display = 'block';
            document.getElementById('operation-view').style.display = 'none';
            document.getElementById('page-title').innerText = 'Vezérlőpult';
            document.getElementById('page-subtitle').innerText = 'Üdvözöljük! Válasszon egy osztályt a munka megkezdéséhez.';
            document.getElementById('class-summary-badges').style.display = 'none';
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('nav a')[0].classList.add('active');
        }

        async function selectClass(id, name) {
            currentClassId = id;
            document.getElementById('class-selection-view').style.display = 'none';
            document.getElementById('operation-view').style.display = 'block';
            document.getElementById('page-title').innerText = name;
            document.getElementById('page-subtitle').innerText = 'Napi feladatok kezelése';
            
            // Lekérjük a diákokat
            const r = await fetch(`${API_BASE_URL}/students/?class_id=${id}`);
            students = await r.json();
            
            // Header badge-ek
            const badges = document.getElementById('class-summary-badges');
            badges.style.display = 'flex';
            badges.innerHTML = `
                <span class="tag" style="background: rgba(99, 102, 241, 0.2); color: #818cf8; border: none;">${students.length} diák</span>
                <span class="tag" style="background: rgba(16, 185, 129, 0.2); color: #34d399; border: none;">Aktív szakasz</span>
            `;

            renderAttendance();
            renderGrades();
            fetchLogs();
            loadTopicSuggestions(id);
            showTab('tab-attendance');
        }

        async function loadTopicSuggestions(classId) {
            try {
                const r = await fetch(`${API_BASE_URL}/suggest/temakor?class_id=${classId}`);
                if(r.ok) {
                    const topics = await r.json();
                    document.getElementById('topics-list').innerHTML = topics.map(t => `<option value="${t}">`).join('');
                }
            } catch(e) {}
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(tabId));
            if(activeBtn) activeBtn.classList.add('active');
            
            // Sidebar sync
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            const navMap = {'tab-attendance': 1, 'tab-logbook': 2, 'tab-grades': 3};
            if(navMap[tabId]) document.querySelectorAll('nav a')[navMap[tabId]].classList.add('active');
        }

        function renderAttendance() {
            const list = document.getElementById('attendance-list');
            list.innerHTML = students.map(s => `
                <div class="card" style="margin: 0; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02);" data-sid="${s.id}">
                    <strong style="font-size: 1.1rem;">${s.nev}</strong>
                    <div style="display: flex; gap: 10px;">
                        <div class="attendance-pill active-jelen" id="p-jelen-${s.id}" onclick="setAtt(${s.id}, 'jelen')"><i class="fas fa-check-circle"></i> Jelen</div>
                        <div class="attendance-pill" id="p-igazolt-${s.id}" onclick="setAtt(${s.id}, 'igazolt_hianyzas')"><i class="fas fa-clock"></i> Igazolt</div>
                        <div class="attendance-pill" id="p-hiany-${s.id}" onclick="setAtt(${s.id}, 'igazolatlan_hianyzas')"><i class="fas fa-times-circle"></i> Hiány</div>
                    </div>
                </div>
            `).join('');
            
            // Default állapot
            students.forEach(s => s.currentStatus = 'jelen');
        }

        function setAtt(sid, status) {
            const s = students.find(x => x.id == sid);
            s.currentStatus = status;
            
            document.getElementById(`p-jelen-${sid}`).className = 'attendance-pill';
            document.getElementById(`p-igazolt-${sid}`).className = 'attendance-pill';
            document.getElementById(`p-hiany-${sid}`).className = 'attendance-pill';
            
            if(status == 'jelen') document.getElementById(`p-jelen-${sid}`).classList.add('active-jelen');
            if(status == 'igazolt_hianyzas') document.getElementById(`p-igazolt-${sid}`).classList.add('active-igazolt');
            if(status == 'igazolatlan_hianyzas') document.getElementById(`p-hiany-${sid}`).classList.add('active-hiany');
        }

        async function submitAttendance() {
            const date = document.getElementById('att-date').value;
            const hours = document.getElementById('att-hours').value;
            const data = students.map(s => ({
                diak_id: s.id,
                datum: date,
                statusz: s.currentStatus || 'jelen',
                oraszam: parseInt(hours),
                tipus: 'iskola'
            }));
            try {
                const r = await fetch(`${API_BASE_URL}/attendance/bulk`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(r.ok) alert('Jelenlét mentve a naplóba! ✅');
            } catch(e) {}
        }

        async function renderGrades() {
            const list = document.getElementById('grades-list');
            list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Adatok frissítése...</td></tr>';
            
            let html = '';
            for(const s of students) {
                const sr = await fetch(`${API_BASE_URL}/students/${s.id}/stats`);
                const stats = await sr.json();
                
                html += `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.03);">
                        <td style="padding: 15px;"><strong>${s.nev}</strong></td>
                        <td style="padding: 15px;">
                            <select id="grade-val-${s.id}" class="login-input" style="width: 60px;">
                                <option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
                            </select>
                        </td>
                        <td style="padding: 15px;">
                            <select id="grade-weight-${s.id}" class="login-input">
                                <option value="100">Általános (100%)</option>
                                <option value="200">Témazáró (200%)</option>
                                <option value="50">Kisérettségi (50%)</option>
                            </select>
                        </td>
                        <td style="padding: 15px; text-align: center;">
                            <strong style="color: var(--accent); font-size: 1.1rem;">${stats.atlag}</strong>
                        </td>
                        <td style="padding: 15px; text-align: center;">
                            <button class="btn-primary" style="padding: 8px 15px; font-size: 0.8rem;" onclick="submitGrade(${s.id})">Rögzít</button>
                        </td>
                    </tr>
                `;
            }
            list.innerHTML = html;
        }

        async function submitGrade(sid) {
            const val = document.getElementById(`grade-val-${sid}`).value;
            const weight = document.getElementById(`grade-weight-${sid}`).value;
            try {
                const r = await fetch(`${API_BASE_URL}/grades/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        diak_id: sid,
                        ertek: parseInt(val),
                        suly: parseInt(weight),
                        tantargy: 'Szakmai gyakorlat',
                        tipus: 'gyakorlat'
                    })
                });
                if(r.ok) renderGrades();
            } catch(e) {}
        }

        async function fetchLogs() {
            const history = document.getElementById('log-history');
            try {
                const r = await fetch(`${API_BASE_URL}/classes/${currentClassId}/logs`);
                const logs = await r.json();
                history.innerHTML = logs.map(l => `
                    <div style="background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border-left: 3px solid var(--accent);">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem; color: #94a3b8;">
                            <span>${new Date(l.datum).toLocaleDateString('hu-HU')}</span>
                            <span>${l.oraszam} óra</span>
                        </div>
                        <div style="font-weight: 600; margin: 4px 0;">${l.temakor}</div>
                        <div style="font-size: 0.85rem; color: #cbd5e1; opacity: 0.7;">${l.tartalom || ''}</div>
                    </div>
                `).join('') || '<p style="color: gray; text-align: center;">Nincs korábbi bejegyzés.</p>';
            } catch(e) {}
        }

        async function submitDailyLog() {
            const topic = document.getElementById('log-topic').value;
            const content = document.getElementById('log-content').value;
            if(!topic) return alert('Témakör kötelező!');
            
            try {
                const r = await fetch(`${API_BASE_URL}/dailylog/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        osztaly_id: currentClassId,
                        datum: document.getElementById('att-date').value,
                        oraszam: parseInt(document.getElementById('att-hours').value),
                        temakor: topic,
                        tartalom: content
                    })
                });
                if(r.ok) {
                    document.getElementById('log-topic').value = '';
                    document.getElementById('log-content').value = '';
                    fetchLogs();
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
